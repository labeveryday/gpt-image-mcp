<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="GPT Image MCP">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a0b2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10a37f"/>
      <stop offset="0.5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#ff5cae"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10a37f" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="260" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200"/>
    <path d="M120 0 V400 M240 0 V400 M360 0 V400 M480 0 V400 M600 0 V400 M720 0 V400 M840 0 V400 M960 0 V400 M1080 0 V400"/>
  </g>

  <!-- left: stylized image frame icon -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="220" height="220" rx="22" fill="none" stroke="url(#frame)" stroke-width="4"/>
    <rect x="14" y="14" width="192" height="192" rx="14" fill="#0f1530"/>
    <!-- mountains -->
    <path d="M14 170 L70 110 L110 150 L150 100 L206 170 Z" fill="#7c5cff" fill-opacity="0.85"/>
    <path d="M14 170 L60 130 L100 160 L140 120 L206 170 Z" fill="#10a37f" fill-opacity="0.85"/>
    <!-- sun -->
    <circle cx="160" cy="60" r="18" fill="#ff5cae" filter="url(#soft)"/>
    <circle cx="160" cy="60" r="14" fill="#ffd166"/>
    <!-- sparkle -->
    <g transform="translate(190,30)" fill="#ffffff">
      <path d="M0 -10 L2 -2 L10 0 L2 2 L0 10 L-2 2 L-10 0 L-2 -2 Z"/>
    </g>
  </g>

  <!-- right: text -->
  <g transform="translate(360,150)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">
      gpt-image-mcp
    </text>
    <rect x="2" y="20" width="640" height="6" rx="3" fill="url(#accent)"/>
    <text x="0" y="76" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif" font-size="26" font-weight="500" fill="#c5c8e6">
      Image generation, editing &amp; analysis for the
    </text>
    <text x="0" y="110" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif" font-size="26" font-weight="500" fill="#c5c8e6">
      Model Context Protocol — powered by
      <tspan font-weight="700" fill="#10a37f">gpt-image-1</tspan>
    </text>
  </g>

  <!-- pill badges -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif" font-size="16" font-weight="600">
    <g transform="translate(360,300)">
      <rect width="118" height="32" rx="16" fill="#10a37f" fill-opacity="0.18" stroke="#10a37f" stroke-width="1.5"/>
      <text x="59" y="21" fill="#10a37f" text-anchor="middle">FastMCP</text>
    </g>
    <g transform="translate(490,300)">
      <rect width="138" height="32" rx="16" fill="#7c5cff" fill-opacity="0.18" stroke="#7c5cff" stroke-width="1.5"/>
      <text x="69" y="21" fill="#b8a8ff" text-anchor="middle">gpt-image-1</text>
    </g>
    <g transform="translate(640,300)">
      <rect width="108" height="32" rx="16" fill="#ff5cae" fill-opacity="0.18" stroke="#ff5cae" stroke-width="1.5"/>
      <text x="54" y="21" fill="#ff9ccd" text-anchor="middle">Python 3.11+</text>
    </g>
  </g>
</svg>
